<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:  rgb(109, 109, 190);
            font-family: Arial, sans-serif;
            color: white;
        }

        .cal {
            width: min(360px, 92vw);
            background: black;
            border-radius: 24px;
            padding: 24px;
            display: grid;
            gap: 18px;
        }

        .cal__screen {
            width: 100%;
            padding: 18px 16px;
            border-radius: 16px;
            border: none;
            background: black;
            color: white;
            font-size: 2rem;
            text-align: right;
        }

        .cal__buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            padding: 18px 0;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
            background: gray;
        }

        .btn--operator {
            background: rgb(89, 89, 230);
        }

        .btn--wide {
            grid-column: span 3;
        }
        .btn--ewide {
            grid-column: span 2;
        }

        .btn--clear {
            background: rgb(209, 70, 70);
        }

        .btn--equals {
            background: green;
        }
    </style>
</head>
<body>
    <div class="cal" id="cal">
        <input class="cal__screen" id="display" type="text" readonly value="" aria-label="Calculator display" />
        <div class="cal__buttons">
            <button class="btn btn--clear btn--wide" data-action="clear">C</button>
            <button class="btn btn--operator" data-value="/">/</button>

            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>

            <button class="btn btn--operator" data-value="*">*</button>

            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>

            <button class="btn btn--operator" data-value="-">-</button>

            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            
            <button class="btn btn--operator" data-value="+">+</button>

            
            <button class="btn btn--ewide" data-value="0">0</button>
            <button class="btn btn--ewide" data-action="equals">=</button>
            
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('#cal .btn');

        function appendInput(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculateResult() {
            try {
                const expression = display.value.trim();
                if (!expression) {
                    return;
                }

                const result = eval(expression);
                display.value = String(result);
            } catch (error) {
                display.value = 'Error';
            }
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const action = button.dataset.action;
                const value = button.dataset.value;

                if (action === 'clear') {
                    clearDisplay();
                    return;
                }

                if (action === 'equals') {
                    calculateResult();
                    return;
                }

                if (value) {
                    appendInput(value);
                }
            });
        });
    </script>
</body>
</html>
