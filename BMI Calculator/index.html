<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="cal">
        <fieldset>
            <legend>BMI Calculator</legend>
            <label for="age">Age: </label>
            <input type="number" id="age" placeholder="year"><br><br>

            <label for="gender">Gender: </label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <label for="Height">Height: </label>
            <input type="number" id="height_feet" placeholder="feet">
            <input type="number" id="height_inch" placeholder="inches"><br><br>

            <label for="weight">Weight: </label>
            <input type="number" id="weight_kg" placeholder="kg"><br><br>

            <button id="btncal">Calculate</button>
        </fieldset>
    </div>
    <div id="result">
            <h2 id="bmi_result"></h2>
    </div>
</body>
</html>
